pipeline:
  max_articles_per_feed: 15
  max_articles_per_day: 100
  articles_per_category: 3        # Target: 3 articles per category per day
  trending_count: 7
  analysis_count: 5
  fetch_delay_seconds: 1.0
  batch_size: 10

api:
  summarize_model: "claude-sonnet-4-6"
  analysis_model: "claude-opus-4-6"
  max_retries: 3
  rate_limit_rpm: 50

# Editorial DNA injection (女娲 perspective skills).
# Each phase can blend in mental models + heuristics + expression DNA from
# installed skills under .claude/skills/<name>-perspective/. Set to [] to disable.
# Available short names: mrbeast, feynman, paul-graham (pg), zhang-yiming.
perspectives:
  summarize: [mrbeast, feynman]
  # generate_analysis: [paul-graham, zhang-yiming]  # future
  # threads: [mrbeast]                              # future

categories:
  - slug: "ai-ml"
    name: "AI & ML"
    color: "#8B5CF6"
  - slug: "startups"
    name: "Startups"
    color: "#F59E0B"
  - slug: "products"
    name: "Products"
    color: "#10B981"
  - slug: "policy"
    name: "Policy"
    color: "#EF4444"
  - slug: "industry"
    name: "Industry"
    color: "#3B82F6"
  - slug: "developer-tools"
    name: "Dev Tools"
    color: "#06B6D4"
  - slug: "hardware"
    name: "Hardware"
    color: "#F97316"

threads:
  posts_per_day: 6
  start_hour: 8           # UTC
  end_hour: 22             # UTC
  delay_between_posts: 30  # seconds

paths:
  raw: "data/raw"
  wiki: "data/wiki"
  dedup: "data/dedup"
  content: "src/content/articles"
  prompts: "prompts"
